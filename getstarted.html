<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stackly Bio Signup</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, sans-serif;
}

body{

min-height:100vh;
display:flex;
align-items:center;
justify-content:center;

background:linear-gradient(135deg,#000,#ff4b00);

padding:60px 20px;

}

/* BACK BUTTON */

.back-home{

position:fixed;
top:20px;
left:20px;

color:#fff;
text-decoration:none;
font-weight:600;
font-size:14px;

}

/* FORM CARD */

.form-box{

background:#fff;
width:100%;
max-width:700px;

padding:40px;
border-radius:16px;

box-shadow:0 25px 40px rgba(0,0,0,0.3);

}

/* HEADER */

.header{

text-align:center;
margin-bottom:30px;

}

.header h2{

color:#ff4b00;
font-size:32px;

}

.header p{

color:#555;

}

/* GRID */

.form-grid{

display:grid;
grid-template-columns:1fr 1fr;
gap:18px;

}

.full{

grid-column:span 2;

}

/* LABEL */

label{

font-size:14px;
display:block;
margin-bottom:5px;

}

/* INPUT */

input,select{

width:100%;
padding:12px;

border-radius:8px;
border:1px solid #ccc;

font-size:14px;

}

/* BUTTON */

button{

width:100%;
padding:14px;

border:none;
border-radius:30px;

background:#ff4b00;
color:#fff;

font-size:16px;
font-weight:600;

cursor:pointer;

transition:.3s;

}

button:hover{

background:#000;

}

/* FOOTER */

.footer{

text-align:center;
margin-top:20px;

}

.footer a{

color:#ff4b00;
text-decoration:none;
font-weight:600;

}

/* MOBILE */

@media(max-width:700px){

.form-grid{

grid-template-columns:1fr;

}

.full{

grid-column:span 1;

}

.form-box{

padding:30px 20px;

}

.header h2{

font-size:26px;

}

}

</style>

</head>


<body>

<a href="index.html" class="back-home">← Back to Home</a>

<div class="form-box">

<div class="header">

<h2>Create Your Account</h2>
<p>Join Stackly Bio Technology Platform</p>

</div>

<form id="signupForm">

<div class="form-grid">

<div>
<label>Full Name</label>
<input type="text" id="name" required>
</div>

<div>
<label>Role</label>
<select required>

<option value="">Select Role</option>
<option>Researcher</option>
<option>Scientist</option>
<option>Biotech Engineer</option>

</select>
</div>

<div class="full">
<label>Email Address</label>
<input type="email" required>
</div>

<div>
<label>Phone Number</label>
<input type="text" id="phone" maxlength="10" required>
</div>

<div>
<label>Organization</label>
<input type="text" required>
</div>

<div>
<label>Password</label>
<input type="password" id="password" required>
</div>

<div>
<label>Confirm Password</label>
<input type="password" id="confirmPassword" required>
</div>

<div class="full">
<button type="submit">Create Account</button>
</div>

</div>

</form>

<div class="footer">

Already have an account? <a href="login.html">Login</a>

</div>

</div>


<script>

/* NAME FIELD ONLY LETTERS */

document.getElementById("name").addEventListener("input",function(){

this.value=this.value.replace(/[^A-Za-z ]/g,'');

});


/* PHONE FIELD ONLY DIGITS */

document.getElementById("phone").addEventListener("input",function(){

this.value=this.value.replace(/[^0-9]/g,'');

if(this.value.length>10){

this.value=this.value.slice(0,10);

}

});


/* FORM VALIDATION */

document.getElementById("signupForm").addEventListener("submit",function(e){

e.preventDefault();

let name=document.getElementById("name").value.trim();
let phone=document.getElementById("phone").value.trim();
let password=document.getElementById("password").value;
let confirm=document.getElementById("confirmPassword").value;

let namePattern=/^[A-Za-z ]+$/;
let phonePattern=/^[0-9]{10}$/;

if(!namePattern.test(name)){

alert("Name must contain only letters");
return;

}

if(!phonePattern.test(phone)){

alert("Phone must be exactly 10 digits");
return;

}

if(password!==confirm){

alert("Passwords do not match");
return;

}

/* SUCCESS */

window.location.href="login.html";

});

</script>

</body>

</html>
